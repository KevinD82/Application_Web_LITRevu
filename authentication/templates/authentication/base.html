{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LITRevu{% endblock %}</title>
    <!-- Chargement du fichier CSS avec cache-busting (?v=1.1) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>

    {% if user.is_authenticated %}
    <header class="navbar">
        <div class="nav-brand">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/logo.png' %}" alt="LITRevu Logo" class="logo">
            </a>
        </div>

        <nav class="nav-center">
            <a href="{% url 'home' %}" class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Flux</a>
            <a href="#" class="nav-item">Mes posts</a>
            <a href="#" class="nav-item">Abonnements</a>
        </nav>

        <div class="nav-right">
            <span class="user-badge">👤 {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">Déconnexion</a>
        </div>
    </header>
    {% endif %}

    <main class="main-container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
