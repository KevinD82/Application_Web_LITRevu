{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LITRevu{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="navbar">
    <!-- Logo détouré (image sans fond) -->
    <a href="{% url 'home' %}" class="brand-logo">
        <img src="{% static 'images/logo.png' %}" alt="Logo LITRevu" class="logo-img">
    </a>

    <!-- Navigation centrale -->
    {% if user.is_authenticated %}
    <nav class="nav-center">
        <a href="{% url 'home' %}" class="nav-item active">Flux</a>
        <a href="#" class="nav-item">Mes posts</a>
        <a href="#" class="nav-item">Abonnements</a>
    </nav>
    {% endif %}

    <!-- Espace Utilisateur à droite -->
    <div class="nav-links">
        {% if user.is_authenticated %}
            <span class="user-badge">👤 <strong>{{ user.username }}</strong></span>
            <a href="{% url 'logout' %}" class="btn-logout">Déconnexion</a>
        {% else %}
            <a href="{% url 'login' %}">Connexion</a>
            <a href="{% url 'signup' %}">Inscription</a>
        {% endif %}
    </div>
</header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
