{% extends 'authentication/base.html' %}

{% block title %}Connexion - LITRevu{% endblock %}

{% block content %}
<h2>Connexion</h2>

{% if message %}
    <p style="color: red;">{{ message }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Se connecter</button>
</form>

<hr>
<p>Pas encore de compte ? <a href="{% url 'signup' %}">Inscrivez-vous ici</a></p>
{% endblock %}
